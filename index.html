<script>
(() => {
  "use strict";

  /* Starstone Defense - GitHub Pages Release Build
     Single-file Canvas game, no external assets, no dependencies.
     Controls: 1-5 select tower, Enter start wave, Space pause, U upgrade, S sell, Esc menu.
  */

  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d", { alpha: false });

  const BASE_W = 1280, BASE_H = 720, WORLD_W = 930, WORLD_H = 620, PANEL_X = 962, PANEL_W = 292;
  const TAU = Math.PI * 2, SAVE_KEY = "starstone_defense_release_v1", MAX_PARTICLES = 420;
  const cam = { ox: 38, oy: 190, depth: 0.55, skew: 0.16, heightScale: 0.92 };

  let dpr = 1, scale = 1, offsetX = 0, offsetY = 0;
  const rand = (a,b) => a + Math.random() * (b - a);
  const clamp = (v,a,b) => Math.max(a, Math.min(b, v));
  const dist = (ax,ay,bx,by) => Math.hypot(ax-bx, ay-by);
  const lerp = (a,b,t) => a + (b-a)*t;
  const fmt = n => Math.floor(n).toString();

  function resize(){
    dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    canvas.width = Math.floor(innerWidth * dpr);
    canvas.height = Math.floor(innerHeight * dpr);
    canvas.style.width = innerWidth + "px";
    canvas.style.height = innerHeight + "px";
    ctx.setTransform(dpr,0,0,dpr,0,0);
    scale = Math.min(innerWidth/BASE_W, innerHeight/BASE_H);
    offsetX = (innerWidth - BASE_W*scale)/2;
    offsetY = (innerHeight - BASE_H*scale)/2;
  }
  addEventListener("resize", resize, { passive:true }); resize();

  function project(x,y,z=0){
    const breathe = Math.sin(game.time*0.22)*1.1;
    return { x: cam.ox + x + (y - WORLD_H*0.5)*cam.skew, y: cam.oy + y*cam.depth - z*cam.heightScale + breathe };
  }
  function unproject(sx,sy){ const y=(sy-cam.oy)/cam.depth; const x=sx-cam.ox-(y-WORLD_H*0.5)*cam.skew; return {x,y}; }
  function screenToGame(cx,cy){ return { x:(cx-offsetX)/scale, y:(cy-offsetY)/scale }; }
  function pointIn(px,py,x,y,w,h){ return px>=x && px<=x+w && py>=y && py<=y+h; }
  function roundRect(c,x,y,w,h,r){ c.beginPath(); c.moveTo(x+r,y); c.arcTo(x+w,y,x+w,y+h,r); c.arcTo(x+w,y+h,x,y+h,r); c.arcTo(x,y+h,x,y,r); c.arcTo(x,y,x+r,y,r); c.closePath(); }
  function segDist(px,py,ax,ay,bx,by){ const vx=bx-ax, vy=by-ay, wx=px-ax, wy=py-ay, l=vx*vx+vy*vy; const t=l?clamp((wx*vx+wy*vy)/l,0,1):0; return Math.hypot(px-(ax+vx*t), py-(ay+vy*t)); }
  function wrap(text,x,y,maxW,lh){ let line=""; for(let i=0;i<text.length;i++){ const test=line+text[i]; if(ctx.measureText(test).width>maxW&&i){ ctx.fillText(line,x,y); line=text[i]; y+=lh; } else line=test; } ctx.fillText(line,x,y); }
  function centered(text,cx,y,maxW,lh){ ctx.textAlign="center"; if(ctx.measureText(text).width<=maxW){ctx.fillText(text,cx,y); ctx.textAlign="left"; return;} let line=""; for(const ch of text){ const test=line+ch; if(ctx.measureText(test).width>maxW&&line){ctx.fillText(line,cx,y); line=ch; y+=lh;} else line=test;} if(line)ctx.fillText(line,cx,y); ctx.textAlign="left"; }

  const towers = {

    cannon:{ name:"重炮机甲", icon:"●", cost:120, range:123, rate:1.45, damage:38, color:"#ff7b54", kind:"shell", splash:58, slow:0, desc:"范围爆炸，清群能力强。" },

    laser:{ name:"棱镜塔", icon:"◆", cost:155, range:162, rate:.22, damage:7, color:"#c77dff", kind:"ray", splash:0, slow:0, desc:"高频单体，克制 Boss 与隐匿敌人。" },
    tesla:{ name:"链雷塔", icon:"ϟ", cost:145, range:138, rate:.95, damage:18, color:"#67e8f9", kind:"chain", splash:0, slow:0, desc:"闪电跳跃，适合中密度敌群。" }
  };

    shield:{ name:"蓝盾兵", hp:92, speed:62, reward:15, damage:1, color:"#60a5fa", r:13, shield:48 },

    ghost:{ name:"隐匿者", hp:72, speed:84, reward:18, damage:1, color:"#a7f3d0", r:12, stealth:true },
    boss:{ name:"碎星巨像", hp:860, speed:36, reward:95, damage:8, color:"#a855f7", r:27, shield:170 }

  const levels = [
    {name:"1-1 松林驿道", chapter:"松林边境", theme:"forest", gold:260, lives:20, sub:"教学关，敌人沿前景驿道推进。", path:[[-35,360],[120,360],[200,250],[330,250],[430,410],[560,410],[670,300],[800,300],[965,390]], waves:[["grunt",9,.75],["grunt",13,.58,"runner",5,.68],["runner",12,.48,"tank",3,1.15],["grunt",18,.38,"shield",6,.78],["tank",7,.85,"runner",12,.36],["boss",1,.5,"shield",10,.52]]},
    {name:"1-2 雾林岔口", chapter:"松林边境", theme:"forest", gold:280, lives:19, sub:"双折线地形，霜晶塔价值上升。", path:[[-35,500],[125,500],[195,220],[330,220],[420,525],[560,525],[610,230],[760,230],[855,430],[965,430]], waves:[["runner",10,.48,"grunt",12,.45],["shield",8,.62,"runner",12,.32],["tank",7,.72,"grunt",20,.28],["healer",4,1.4,"shield",10,.45],["splitter",8,.58,"runner",24,.2],["boss",1,.5,"healer",5,.85,"tank",8,.55]]},
    {name:"2-1 峡谷矿道", chapter:"赤砂峡谷", theme:"canyon", gold:300, lives:18, sub:"弯道密集，适合制造爆炸火力口袋。", path:[[-35,155],[130,155],[190,500],[320,500],[380,170],[520,170],[585,545],[735,545],[805,210],[965,210]], waves:[["grunt",14,.55,"runner",6,.5],["shield",7,.72,"grunt",16,.38],["tank",7,.74,"runner",18,.32],["healer",5,1.2,"shield",12,.42],["runner",30,.2,"tank",10,.58],["boss",1,.5,"shield",18,.35,"tank",8,.52]]},
    {name:"2-2 熔砂桥墟", chapter:"赤砂峡谷", theme:"canyon", gold:315, lives:17, sub:"裂殖兽登场，死亡后会分裂小怪。", path:[[-35,420],[90,420],[145,165],[285,165],[365,470],[500,470],[560,130],[705,130],[770,500],[860,500],[965,330]], waves:[["splitter",8,.75,"grunt",16,.32],["tank",9,.56,"runner",18,.24],["healer",6,.95,"shield",16,.32],["splitter",16,.4,"runner",26,.16],["tank",18,.36,"healer",8,.7],["boss",1,.3,"splitter",20,.28,"shield",16,.28]]},

    {name:"3-2 星石核心", chapter:"最终防线", theme:"ruin", gold:365, lives:16, sub:"双 Boss 终战，所有机制同时登场。", path:[[-35,300],[90,300],[175,520],[320,520],[385,170],[530,170],[595,530],[710,530],[750,120],[875,120],[965,380]], waves:[["runner",30,.18,"shield",14,.28],["tank",18,.34,"healer",8,.62],["splitter",28,.22,"ghost",20,.2],["boss",1,.1,"shield",24,.22,"healer",10,.42],["boss",2,6.5,"tank",24,.28,"splitter",22,.24],["boss",2,5.2,"runner",70,.08,"healer",16,.28]]}
  ];

  const techDefs = [
    {key:"supply",name:"初始补给",max:5,cost:[1,2,3,4,5],desc:"每级初始金币 +20。"},
    {key:"core",name:"星石核心",max:4,cost:[1,2,3,4],desc:"每级生命上限 +1。"},
    {key:"arrow",name:"弩塔校准",max:5,cost:[1,2,3,4,5],desc:"每级弩塔伤害 +8%。"},
    {key:"cannon",name:"重炮装药",max:5,cost:[1,2,3,4,5],desc:"每级炮塔爆炸半径 +8%。"},
    {key:"frost",name:"霜晶共鸣",max:5,cost:[1,2,3,4,5],desc:"每级减速持续时间 +0.25 秒。"},
    {key:"laser",name:"棱镜聚焦",max:5,cost:[1,2,3,4,5],desc:"每级棱镜塔对 Boss 伤害 +12%。"},
    {key:"tesla",name:"链雷扩容",max:5,cost:[1,2,3,4,5],desc:"每级链雷跳跃伤害衰减减少。"}
  ];
  const achievements = [
    {key:"first",name:"第一滴星火",desc:"完成任意关卡。",reward:1},
    {key:"perfect",name:"无漏防线",desc:"任意关卡 3 星通关。",reward:2},
    {key:"boss",name:"巨像猎手",desc:"击败一个 Boss。",reward:2},
    {key:"daily",name:"今日指挥官",desc:"完成每日挑战。",reward:2},
    {key:"all",name:"战役终章",desc:"完成全部关卡。",reward:4},
    {key:"hard",name:"高压部署",desc:"困难难度通关任意关卡。",reward:3},
    {key:"collector",name:"星石工程师",desc:"购买任意 8 次科技升级。",reward:3}
  ];

  function blankSave(){ const tech={}, ach={}; for(const t of techDefs) tech[t.key]=0; for(const a of achievements) ach[a.key]=false; return {version:1, unlocked:1, stars:Array(levels.length).fill(0), best:Array(levels.length).fill(0), shards:0, earned:0, tech, ach, stats:{kills:0,bossKills:0,techBuys:0,dailyWins:0}, settings:{sound:true,music:true,volume:.55,difficulty:"normal",autoWave:false,showDamage:true,screenFx:true,perf:"balanced"}}; }
  function load(){ try{ const raw=localStorage.getItem(SAVE_KEY); if(!raw) return blankSave(); const old=JSON.parse(raw), base=blankSave(); return {...base,...old, tech:{...base.tech,...(old.tech||{})}, ach:{...base.ach,...(old.ach||{})}, stats:{...base.stats,...(old.stats||{})}, settings:{...base.settings,...(old.settings||{})}, stars:Array.isArray(old.stars)?old.stars:base.stars, best:Array.isArray(old.best)?old.best:base.best}; }catch{return blankSave();} }
  let save = load();
  function persist(){ try{ localStorage.setItem(SAVE_KEY, JSON.stringify(save)); }catch{} }
  const TL = k => save.tech[k] || 0;
  function unlockAch(key){ const a=achievements.find(x=>x.key===key); if(!a||save.ach[key]) return; save.ach[key]=true; save.shards+=a.reward; save.earned+=a.reward; game.toast=`成就解锁：${a.name}  +${a.reward}★`; game.toastTime=3.0; audio.beep(920,.16,"triangle",.07); persist(); }

  const game = { state:"menu", page:"campaign", level:0, daily:false, dailyMod:null, gold:0,lives:0,startLives:0,wave:0,waveOn:false,queue:[],spawnT:0,towers:[],enemies:[],shots:[],particles:[],texts:[],selected:"arrow",selectedTower:null,hover:{x:0,y:0,gx:0,gy:0,world:false},paused:false,speed:1,time:0,shake:0,toast:"",toastTime:0,autoTimer:0,bossBanner:0,bossName:"",score:0,kills:0,placed:0,resultStars:0,resultShards:0,tutorial:0,fps:60,fa:0,fc:0 };
  const buttons = [];

  const audio = { ctx:null, music:null, gain:null, init(){ if(!this.ctx){ const AC=window.AudioContext||window.webkitAudioContext; if(AC)this.ctx=new AC(); } if(this.ctx&&this.ctx.state==="suspended")this.ctx.resume(); }, vol(g=.05){ return save.settings.sound ? clamp(save.settings.volume,0,1)*g : 0; }, beep(f,d=.08,type="sine",g=.05){ this.init(); if(!this.ctx||!save.settings.sound)return; const n=this.ctx.currentTime,o=this.ctx.createOscillator(),gn=this.ctx.createGain(); o.type=type; o.frequency.value=f; gn.gain.setValueAtTime(.0001,n); gn.gain.exponentialRampToValueAtTime(Math.max(.0002,this.vol(g)),n+.012); gn.gain.exponentialRampToValueAtTime(.0001,n+d); o.connect(gn); gn.connect(this.ctx.destination); o.start(n); o.stop(n+d+.03); }, noise(d=.12,g=.06){ this.init(); if(!this.ctx||!save.settings.sound)return; const len=Math.floor(this.ctx.sampleRate*d), b=this.ctx.createBuffer(1,len,this.ctx.sampleRate), data=b.getChannelData(0); for(let i=0;i<len;i++)data[i]=(Math.random()*2-1)*(1-i/len); const s=this.ctx.createBufferSource(), gn=this.ctx.createGain(); gn.gain.value=this.vol(g); s.buffer=b; s.connect(gn); gn.connect(this.ctx.destination); s.start(); }, click(){this.beep(620,.045,"triangle",.035)}, build(){this.beep(300,.07,"sawtooth",.05); setTimeout(()=>this.beep(560,.06,"triangle",.035),45)}, fire(k){ if(k==="shell"){this.noise(.12,.10); this.beep(90,.12,"square",.04);} else if(k==="ice")this.beep(1080,.08,"triangle",.035); else if(k==="ray")this.beep(760,.055,"sawtooth",.035); else if(k==="chain")this.beep(920,.05,"square",.035); }, startMusic(){ this.init(); if(!this.ctx||this.music||!save.settings.music)return; const o=this.ctx.createOscillator(), g=this.ctx.createGain(); o.type="triangle"; o.frequency.value=50; g.gain.value=save.settings.volume*.018; o.connect(g); g.connect(this.ctx.destination); o.start(); this.music=o; this.gain=g; }, stopMusic(){ if(this.music){try{this.music.stop()}catch{}} this.music=null; this.gain=null; }, update(){ if(!save.settings.music||game.state!=="play"){this.stopMusic();return;} if(!this.music)this.startMusic(); if(this.gain)this.gain.gain.value=save.settings.volume*.018; if(this.music)this.music.frequency.value=48+Math.sin(game.time*.55)*5+game.level*4; } };

  function todaySeed(){ const d=new Date(); return d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate(); }
  function seeded(seed){ let s=seed>>>0; return () => ((s=(1664525*s+1013904223)>>>0)/4294967296); }
  function dailyMod(){ const r=seeded(todaySeed()); const mods=["敌军生命 +18%","初始金币 -15%","敌军速度 +12%","炮塔售价 -10%","Boss 护盾 +25%"];
    return { seed:todaySeed(), level:Math.floor(r()*levels.length), mods:[mods[Math.floor(r()*mods.length)],mods[Math.floor(r()*mods.length)]].filter((v,i,a)=>a.indexOf(v)===i) };
  }

  function levelGold(lv){ let g=lv.gold+TL("supply")*20; if(game.dailyMod&&game.dailyMod.mods.includes("初始金币 -15%"))g=Math.floor(g*.85); return g; }
  function levelLives(lv){ return lv.lives + TL("core"); }
  function towerCost(key){ let c=towers[key].cost; if(game.dailyMod&&game.dailyMod.mods.includes("炮塔售价 -10%"))c=Math.floor(c*.9); return c; }
  function difficultyMul(){ return save.settings.difficulty==="hard"?1.18:save.settings.difficulty==="easy"?.88:1; }

  function startLevel(i, daily=false){ const lv=levels[i]; game.state="play"; game.level=i; game.daily=daily; game.dailyMod=daily?dailyMod():null; game.gold=levelGold(lv); game.lives=levelLives(lv); game.startLives=game.lives; game.wave=0; game.waveOn=false; game.queue=[]; game.spawnT=0; game.towers=[]; game.enemies=[]; game.shots=[]; game.particles=[]; game.texts=[]; game.selected="arrow"; game.selectedTower=null; game.paused=false; game.speed=1; game.time=0; game.shake=0; game.toast=daily?"每日挑战启动："+game.dailyMod.mods.join(" / "):"准备布防。选择塔后点击地面建造。"; game.toastTime=4; game.autoTimer=0; game.bossBanner=0; game.score=0; game.kills=0; game.placed=0; game.resultStars=0; game.resultShards=0; game.tutorial=i===0&&save.stars[0]===0?0:9; audio.startMusic(); }

  function queueWave(){ if(game.waveOn||game.state!=="play")return; const lv=levels[game.level]; if(game.wave>=lv.waves.length)return; game.queue=[]; const spec=lv.waves[game.wave]; for(let i=0;i<spec.length;i+=3){ const type=spec[i], count=spec[i+1], gap=spec[i+2]; for(let j=0;j<count;j++)game.queue.push({type,delay:j?gap:.25}); game.queue.push({type:"wait",delay:1.05}); } game.spawnT=.1; game.waveOn=true; game.autoTimer=0; game.toast=`第 ${game.wave+1} 波来袭`; game.toastTime=2; if(game.tutorial===1){game.tutorial=2;} }

  function spawn(type, parent){ const lv=levels[game.level], def=enemy[type]; let hpMul=difficultyMul()*(1+game.level*.22+game.wave*.105); if(game.dailyMod){ if(game.dailyMod.mods.includes("敌军生命 +18%"))hpMul*=1.18; if(type==="boss"&&game.dailyMod.mods.includes("Boss 护盾 +25%"))hpMul*=1.08; }
    const e={type,name:def.name,x:parent?parent.x+(Math.random()<.5?-12:12):lv.path[0][0],y:parent?parent.y+rand(-10,10):lv.path[0][1],r:def.r,hp:def.hp*hpMul,maxHp:def.hp*hpMul,baseSpeed:def.speed*(game.dailyMod&&game.dailyMod.mods.includes("敌军速度 +12%")?1.12:1),reward:Math.round(def.reward*(1+game.wave*.05)),damage:def.damage,color:def.color,shield:(def.shield||0)*hpMul,maxShield:(def.shield||0)*hpMul,healAura:def.healAura||0,split:!!def.split,stealth:!!def.stealth,seg:parent?parent.seg:0,progress:parent?parent.progress:0,slow:.0,slowTime:0,alive:true,flash:0,anim:rand(0,100),child:!!parent};
    if(type==="boss"){ game.bossBanner=3.2; game.bossName=def.name; game.shake=18; audio.beep(70,.35,"sawtooth",.08); }
    game.enemies.push(e); }

  function canPlace(x,y){ if(x<28||x>WORLD_W-28||y<28||y>WORLD_H-18)return false; const p=levels[game.level].path; for(let i=0;i<p.length-1;i++) if(segDist(x,y,p[i][0],p[i][1],p[i+1][0],p[i+1][1])<48)return false; for(const t of game.towers) if(dist(x,y,t.x,t.y)<44)return false; return true; }
  function makeTower(key,x,y){ const def=towers[key], cost=towerCost(key); if(game.gold<cost){notice("金币不足"); audio.beep(150,.07,"square",.035); return;} if(!canPlace(x,y)){notice("不能建在道路或其他塔附近"); return;} game.gold-=cost; const t={key,x,y,level:1,cool:0,angle:-Math.PI/2,kills:0,spent:cost,pulse:.35,recoil:0}; game.towers.push(t); game.selectedTower=t; game.placed++; burst(x,y,8,def.color,24,110); audio.build(); if(game.tutorial===0){game.tutorial=1; notice("很好。现在按 Enter 或点击开始波次。",4);} }
  function tStats(t){ const def=towers[t.key], lv=t.level; let damage=def.damage*Math.pow(1.36,lv-1), range=def.range*(1+.11*(lv-1)), splash=def.splash*(1+.12*(lv-1)), slow=def.slow; if(t.key==="arrow")damage*=1+.08*TL("arrow"); if(t.key==="cannon")splash*=1+.08*TL("cannon"); return {damage,range,splash,slow,rate:def.rate*Math.pow(.91,lv-1),kind:def.kind,color:def.color}; }
  function upgradeCost(t){return Math.round(towers[t.key].cost*(.72+t.level*.62));}
  function upgrade(){ const t=game.selectedTower; if(!t)return; if(t.level>=4){notice("已满级");return;} const c=upgradeCost(t); if(game.gold<c){notice("升级需要 "+c);return;} game.gold-=c; t.spent+=c; t.level++; t.pulse=.5; burst(t.x,t.y,30,towers[t.key].color,35,150); audio.beep(560,.1,"triangle",.05); }
  function sell(){ const t=game.selectedTower; if(!t)return; const r=Math.round(t.spent*.65); game.gold+=r; game.towers=game.towers.filter(x=>x!==t); game.selectedTower=null; burst(t.x,t.y,20,"#f8fafc",22,110); notice("回收 +"+r); }
  function notice(s,t=1.6){ game.toast=s; game.toastTime=t; }

  function hit(e,amount,src){ if(!e.alive)return; let dmg=amount; if(src&&src.key==="laser"&&e.type==="boss")dmg*=1+.12*TL("laser"); if(e.shield>0){ const take=Math.min(e.shield,dmg*.82); e.shield-=take; dmg-=take*.55; } e.hp-=dmg; e.flash=.12; if(save.settings.showDamage&&Math.random()<.42) text(e.x+rand(-9,9),e.y,50,"-"+Math.round(amount),"#fecaca"); if(e.hp<=0){ e.alive=false; if(e.split&&!e.child){ spawn("runner",e); spawn("runner",e); } game.gold+=e.reward; game.score+=Math.round(e.maxHp+e.reward*12); game.kills++; save.stats.kills++; if(e.type==="boss"){ save.stats.bossKills++; unlockAch("boss"); } if(src)src.kills++; burst(e.x,e.y,34,e.color,e.type==="boss"?75:28,e.type==="boss"?230:145); text(e.x,e.y,52,"+"+e.reward,"#fde68a"); audio.noise(.08,.045); } }
  function burst(x,y,z,color,count,speed){ for(let i=0;i<count&&game.particles.length<MAX_PARTICLES;i++){ const a=rand(0,TAU), sp=rand(speed*.25,speed); game.particles.push({x,y,z,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp*.55,vz:rand(30,160),life:rand(.25,.85),max:rand(.25,.85),color,r:rand(1.4,4.4)}); } }
  function text(x,y,z,str,color){ game.texts.push({x,y,z,str,color,life:.85,vy:-24,vz:36}); }

  function findTarget(t,st){ let best=null, bp=-1; for(const e of game.enemies){ if(!e.alive)continue; if(e.stealth && !(t.key==="laser"||t.key==="tesla")) continue; const d=dist(t.x,t.y,e.x,e.y); if(d<=st.range){ const p=e.seg+e.progress+(e.type==="boss"?.35:0); if(p>bp){bp=p; best=e;} } } return best; }
  function fire(t,target,st){ const def=towers[t.key]; t.cool=st.rate; t.angle=Math.atan2(target.y-t.y,target.x-t.x); t.recoil=.16; audio.fire(st.kind); if(st.kind==="ray"){ hit(target,st.damage,t); game.shots.push({kind:"ray",x:t.x,y:t.y,z:34,tx:target.x,ty:target.y,tz:34,life:.09,max:.09,color:def.color}); }
    else if(st.kind==="chain"){ let hits=0, last=target, decay=1, used=new Set(); while(last&&hits<3+t.level){ used.add(last); hit(last,st.damage*decay,t); const a=project(last.x,last.y,34), b=hits?project(target.x,target.y,34):project(t.x,t.y,34); game.shots.push({kind:"ray",x: hits?target.x:t.x,y:hits?target.y:t.y,z:34,tx:last.x,ty:last.y,tz:34,life:.12,max:.12,color:def.color}); target=last; hits++; decay*=.66+.03*TL("tesla"); last=null; let bd=76; for(const e of game.enemies){ if(e.alive&&!used.has(e)){ const d=dist(target.x,target.y,e.x,e.y); if(d<bd){bd=d; last=e;} } } } }
    else { const speed=st.kind==="shell"?410:st.kind==="ice"?450:560; game.shots.push({kind:st.kind,x:t.x,y:t.y,z:33,target,speed,damage:st.damage,splash:st.splash,slow:st.slow,owner:t,color:def.color,r:st.kind==="shell"?6:4,alive:true}); } }

  function update(dt){ audio.update(); if(game.toastTime>0)game.toastTime-=dt; if(game.state!=="play"||game.paused){ updParticles(dt); return; } const step=dt*game.speed; game.time+=step; game.shake=Math.max(0,game.shake-dt*18); if(game.bossBanner>0)game.bossBanner-=dt; if(game.autoTimer>0&&!game.waveOn){ game.autoTimer-=step; if(game.autoTimer<=0)queueWave(); }
    updateSpawns(step); updateEnemies(step); updateTowers(step); updateShots(step); updParticles(step);
    if(game.waveOn&&game.queue.length===0&&game.enemies.length===0){ game.waveOn=false; game.wave++; const lv=levels[game.level]; if(game.wave>=lv.waves.length)finishLevel(); else { const b=42+game.wave*12; game.gold+=b; if(save.settings.autoWave){game.autoTimer=1.45; notice(`本波完成 +${b}，自动开波中`,2);} else notice(`本波完成 +${b}`,2); } }
    if(game.lives<=0){ game.state="defeat"; game.shake=18; audio.beep(90,.36,"sawtooth",.08); }
  }
  function updateSpawns(dt){ if(!game.waveOn||!game.queue.length)return; game.spawnT-=dt; while(game.spawnT<=0&&game.queue.length){ const it=game.queue.shift(); if(it.type!=="wait")spawn(it.type); game.spawnT+=it.delay; } }
  function updateEnemies(dt){ const lv=levels[game.level]; for(const e of game.enemies){ if(!e.alive)continue; e.anim+=dt; e.flash=Math.max(0,e.flash-dt); if(e.slowTime>0)e.slowTime-=dt; else e.slow=0; if(e.type==="boss"&&e.hp<e.maxHp*.5)e.baseSpeed=Math.max(e.baseSpeed,enemy.boss.speed*1.42); let move=e.baseSpeed*(e.slow||1)*dt; while(move>0&&e.seg<lv.path.length-1){ const a=lv.path[e.seg],b=lv.path[e.seg+1], L=dist(a[0],a[1],b[0],b[1]), rem=L*(1-e.progress); if(move<rem){ e.progress+=move/L; e.x=lerp(a[0],b[0],e.progress); e.y=lerp(a[1],b[1],e.progress); move=0; } else { move-=rem; e.seg++; e.progress=0; if(e.seg>=lv.path.length-1){ e.alive=false; game.lives-=e.damage; game.shake=10; text(WORLD_W-70,e.y,50,"-"+e.damage+"❤","#ff8a80"); break; } } } }
    for(const h of game.enemies){ if(!h.alive||!h.healAura)continue; for(const e of game.enemies){ if(e.alive&&e!==h&&e.hp<e.maxHp&&dist(h.x,h.y,e.x,e.y)<=h.healAura){ e.hp=Math.min(e.maxHp,e.hp+7*dt); if(Math.random()<.035)burst(e.x,e.y,26,"#f9a8d4",1,30); } } }
    game.enemies=game.enemies.filter(e=>e.alive); }
  function updateTowers(dt){ for(const t of game.towers){ const st=tStats(t); t.cool-=dt; t.pulse=Math.max(0,t.pulse-dt); t.recoil=Math.max(0,t.recoil-dt*3.6); const target=findTarget(t,st); if(target){ const want=Math.atan2(target.y-t.y,target.x-t.x); let diff=((want-t.angle+Math.PI)%TAU)-Math.PI; t.angle+=diff*Math.min(1,dt*12); if(t.cool<=0)fire(t,target,st); } } }
  function updateShots(dt){ for(const p of game.shots){ if(p.kind==="ray"){p.life-=dt; continue;} if(!p.alive||!p.target||!p.target.alive){p.alive=false; continue;} const dx=p.target.x-p.x, dy=p.target.y-p.y, d=Math.hypot(dx,dy), tr=p.speed*dt; if(d<=tr+p.target.r){ p.x=p.target.x;p.y=p.target.y;p.z=32; if(p.splash>0){ burst(p.x,p.y,22,p.color,24,135); for(const e of game.enemies){ const dd=dist(p.x,p.y,e.x,e.y); if(e.alive&&dd<=p.splash)hit(e,p.damage*(1-dd/p.splash*.55),p.owner); } game.shake=Math.max(game.shake,5); } else { hit(p.target,p.damage,p.owner); if(p.slow>0&&p.target.alive){ p.target.slow=Math.min(p.target.slow||1,p.slow); p.target.slowTime=Math.max(p.target.slowTime,1.8+.12*p.owner.level+.25*TL("frost")); burst(p.target.x,p.target.y,26,"#b3e5fc",12,70); } } p.alive=false; } else { p.x+=dx/d*tr; p.y+=dy/d*tr; p.z=30+Math.sin(game.time*18)*2; } } game.shots=game.shots.filter(p=>p.kind==="ray"?p.life>0:p.alive); }
  function updParticles(dt){ for(const p of game.particles){ p.life-=dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.z+=p.vz*dt; p.vz-=260*dt; if(p.z<0){p.z=0;p.vz*=-.25} p.vx*=Math.exp(-1.8*dt); p.vy*=Math.exp(-1.8*dt);} game.particles=game.particles.filter(p=>p.life>0); for(const f of game.texts){ f.life-=dt; f.y+=f.vy*dt; f.z+=f.vz*dt; f.vz-=70*dt; } game.texts=game.texts.filter(f=>f.life>0); }
  function finishLevel(){ game.state="victory"; game.gold+=75; game.score+=game.lives*250+game.gold*8; const ratio=game.startLives?game.lives/game.startLives:0; const stars=ratio>=.85?3:ratio>=.55?2:1; game.resultStars=stars; const old=save.stars[game.level]||0, gained=Math.max(0,stars-old); game.resultShards=gained; if(stars>old)save.stars[game.level]=stars; save.shards+=gained; save.earned+=gained; save.unlocked=Math.max(save.unlocked,Math.min(levels.length,game.level+2)); save.best[game.level]=Math.max(save.best[game.level]||0,game.score); unlockAch("first"); if(stars===3)unlockAch("perfect"); if(game.level===levels.length-1)unlockAch("all"); if(save.settings.difficulty==="hard")unlockAch("hard"); if(game.daily){save.stats.dailyWins++; unlockAch("daily");} persist(); audio.beep(740,.16,"triangle",.06); setTimeout(()=>audio.beep(920,.18,"triangle",.055),120); }

  function topbar(){ roundRect(ctx,18,16,918,54,18);const g=ctx.createLinearGradient(18,16,936,70);g.addColorStop(0,'rgba(15,23,42,.78)');g.addColorStop(1,'rgba(30,64,175,.30)');ctx.fillStyle=g;ctx.fill();ctx.strokeStyle='rgba(191,219,254,.22)';ctx.stroke();ctx.fillStyle='#f8fafc';ctx.font='900 18px system-ui, Microsoft YaHei';ctx.fillText(levels[game.level].name,38,50);ctx.font='800 15px system-ui, Microsoft YaHei';ctx.fillStyle='#fde68a';ctx.fillText('金币 '+game.gold,315,50);ctx.fillStyle='#fca5a5';ctx.fillText('生命 '+Math.max(0,game.lives),420,50);ctx.fillStyle='#bfdbfe';ctx.fillText('波次 '+Math.min(game.wave+1,levels[game.level].waves.length)+'/'+levels[game.level].waves.length,526,50);ctx.fillStyle='#d8b4fe';ctx.fillText('得分 '+game.score,646,50);ctx.fillStyle='#a7f3d0';ctx.fillText(save.settings.difficulty==='hard'?'困难':save.settings.difficulty==='easy'?'轻松':'标准',780,50);ctx.fillStyle='#93c5fd';ctx.fillText('FPS '+game.fps,850,50); if(game.autoTimer>0){ctx.fillStyle='#fde68a';ctx.fillText('自动 '+game.autoTimer.toFixed(1),850,72);} if(game.toastTime>0){ctx.fillStyle='rgba(255,255,255,'+clamp(game.toastTime/.8,0,1)+')';ctx.font='14px system-ui, Microsoft YaHei';ctx.fillText(game.toast,38,82);} }
  function bossBanner(){ if(game.bossBanner<=0)return;ctx.save();ctx.globalAlpha=clamp(game.bossBanner/.6,0,1);const y=112,g=ctx.createLinearGradient(210,y,730,y+54);g.addColorStop(0,'rgba(127,29,29,0)');g.addColorStop(.25,'rgba(185,28,28,.78)');g.addColorStop(.75,'rgba(88,28,135,.78)');g.addColorStop(1,'rgba(127,29,29,0)');ctx.fillStyle=g;ctx.fillRect(160,y,650,56);ctx.textAlign='center';ctx.fillStyle='#fff7ed';ctx.font='900 26px system-ui, Microsoft YaHei';ctx.fillText('巨型目标出现：'+(game.bossName||'未知威胁'),485,y+37);ctx.textAlign='left';ctx.restore(); }
  function tutorial(){ if(!(game.level===0&&save.stars[0]===0))return; if(game.tutorial===0)callout(PANEL_X+18,88,'先选一座塔','推荐从弩塔开始。',245); if(game.tutorial===1&&!game.waveOn)callout(PANEL_X+18,430,'开始第一波','点击开始波次，或按 Enter。',245); }
  function callout(x,y,title,body,w){ roundRect(ctx,x,y,w,74,16);ctx.fillStyle='rgba(2,6,23,.84)';ctx.fill();ctx.strokeStyle='#fde68a';ctx.lineWidth=2;ctx.stroke();ctx.fillStyle='#fde68a';ctx.font='900 15px system-ui, Microsoft YaHei';ctx.fillText(title,x+14,y+27);ctx.fillStyle='#e5e7eb';ctx.font='12px system-ui, Microsoft YaHei';wrap(body,x+14,y+50,w-28,18); }
  function atmosphere(theme){ if(!save.settings.screenFx)return; const fog=ctx.createLinearGradient(0,110,0,520);fog.addColorStop(0,theme==='canyon'?'rgba(251,146,60,.10)':'rgba(147,197,253,.10)');fog.addColorStop(.55,'rgba(255,255,255,0)');fog.addColorStop(1,'rgba(2,6,23,.18)');ctx.fillStyle=fog;ctx.fillRect(0,0,PANEL_X-6,BASE_H); }
  function drawPanel(){ buttons.length=0;ctx.fillStyle='#020617';ctx.fillRect(PANEL_X-8,0,PANEL_W+25,BASE_H);roundRect(ctx,PANEL_X,14,PANEL_W,BASE_H-28,26);const pg=ctx.createLinearGradient(PANEL_X,14,BASE_W,BASE_H);pg.addColorStop(0,'rgba(15,23,42,.96)');pg.addColorStop(.55,'rgba(30,41,89,.92)');pg.addColorStop(1,'rgba(2,6,23,.98)');ctx.fillStyle=pg;ctx.fill();ctx.strokeStyle='rgba(147,197,253,.25)';ctx.lineWidth=1.5;ctx.stroke();ctx.fillStyle='#e0f2fe';ctx.font='900 23px system-ui, Microsoft YaHei';ctx.fillText('战术终端',PANEL_X+20,50);ctx.fillStyle='#94a3b8';ctx.font='12px system-ui, Microsoft YaHei';ctx.fillText('GitHub Pages Release Build',PANEL_X+20,72); let y=91; for(const k of towerOrder){towerCard(k,PANEL_X+16,y,253,63);y+=68;} controls(PANEL_X+16,y+8); towerInfo(PANEL_X+16,y+132); }
  function towerCard(k,x,y,w,h){ const d=towers[k], sel=game.selected===k&&!game.selectedTower, afford=game.gold>=towerCost(k), hov=pointIn(game.hover.x,game.hover.y,x,y,w,h);roundRect(ctx,x,y,w,h,15);ctx.fillStyle=sel?'rgba(59,130,246,.33)':hov?'rgba(255,255,255,.10)':'rgba(255,255,255,.055)';ctx.fill();ctx.strokeStyle=sel?d.color:'rgba(255,255,255,.13)';ctx.lineWidth=sel?2.2:1;ctx.stroke();ctx.fillStyle=afford?d.color:'#64748b';ctx.font='900 25px system-ui';ctx.textAlign='center';ctx.fillText(d.icon,x+30,y+40);ctx.textAlign='left';ctx.fillStyle=afford?'#f8fafc':'#94a3b8';ctx.font='900 14px system-ui, Microsoft YaHei';ctx.fillText(d.name+'  $'+towerCost(k),x+58,y+24);ctx.fillStyle='#cbd5e1';ctx.font='11px system-ui, Microsoft YaHei';ctx.fillText('伤害 '+d.damage+' · 射程 '+d.range+' · 间隔 '+d.rate+'s',x+58,y+43);ctx.fillStyle='#94a3b8';ctx.fillText(d.desc,x+58,y+58);buttons.push({x,y,w,h,fn:()=>{game.selected=k;game.selectedTower=null;audio.click();}}); }
  function controls(x,y){ btn(x,y,122,42,game.waveOn?'进攻中':'开始波次',game.waveOn?'#475569':'#22c55e',queueWave); btn(x+132,y,121,42,game.paused?'继续':'暂停','#3b82f6',()=>{game.paused=!game.paused;audio.click();}); btn(x,y+52,54,36,'1x',game.speed===1?'#f59e0b':'#334155',()=>{game.speed=1;audio.click();});btn(x+63,y+52,54,36,'2x',game.speed===2?'#f59e0b':'#334155',()=>{game.speed=2;audio.click();});btn(x+126,y+52,54,36,'3x',game.speed===3?'#f59e0b':'#334155',()=>{game.speed=3;audio.click();});btn(x+189,y+52,64,36,'重开','#ef4444',()=>startLevel(game.level,game.daily)); }
  function btn(x,y,w,h,label,color,fn){ const hov=pointIn(game.hover.x,game.hover.y,x,y,w,h);roundRect(ctx,x,y,w,h,13);ctx.fillStyle=hov?color:color+'cc';ctx.fill();ctx.strokeStyle='rgba(255,255,255,.18)';ctx.stroke();ctx.fillStyle='#fff';ctx.font='900 14px system-ui, Microsoft YaHei';ctx.textAlign='center';ctx.fillText(label,x+w/2,y+h/2+5);ctx.textAlign='left';buttons.push({x,y,w,h,fn}); }
  function towerInfo(x,y){ roundRect(ctx,x,y,253,178,18);ctx.fillStyle='rgba(0,0,0,.22)';ctx.fill();ctx.strokeStyle='rgba(255,255,255,.10)';ctx.stroke();ctx.fillStyle='#e2e8f0';ctx.font='900 16px system-ui, Microsoft YaHei'; if(!game.selectedTower){ const d=towers[game.selected];ctx.fillText('当前建造：'+d.name,x+15,y+31);ctx.fillStyle='#cbd5e1';ctx.font='13px system-ui, Microsoft YaHei';wrap(d.desc+' 点击地面部署，不能贴近道路。',x+15,y+58,222,22);ctx.fillStyle=d.color;ctx.font='900 40px system-ui';ctx.textAlign='center';ctx.fillText(d.icon,x+126,y+145);ctx.textAlign='left';return;} const t=game.selectedTower,d=towers[t.key],s=tStats(t);ctx.fillText(d.name+' Lv.'+t.level,x+15,y+31);ctx.fillStyle='#cbd5e1';ctx.font='13px system-ui, Microsoft YaHei';ctx.fillText('伤害 '+fmt(s.damage)+' · 射程 '+fmt(s.range),x+15,y+58);ctx.fillText('间隔 '+s.rate.toFixed(2)+'s · 击杀 '+t.kills,x+15,y+80);ctx.fillText('已投入金币 '+t.spent,x+15,y+102);btn(x+15,y+122,108,38,t.level>=4?'已满级':'升级 $'+upgradeCost(t),t.level>=4?'#64748b':'#22c55e',upgrade);btn(x+132,y+122,106,38,'出售','#f97316',sell); }
  function drawOverlay(){ if(game.paused&&game.state==='play')overlayText('已暂停','按空格继续','#bfdbfe'); else if(game.state==='victory')overlayBox(game.level===levels.length-1&&!game.daily?'全线通关！':'关卡胜利',`获得 ${game.resultStars} 星 · 新增星石 ${game.resultShards} · 得分 ${game.score}`,game.level===levels.length-1?'返回菜单':'下一关',()=>{ if(game.level===levels.length-1||game.daily){game.state='menu';game.page='campaign';audio.stopMusic();} else startLevel(game.level+1,false); }); else if(game.state==='defeat')overlayBox('防线失守','敌人突破了核心区。调整塔位，升级科技树，再来一局。','重新挑战',()=>startLevel(game.level,game.daily)); }
  function overlayText(title,sub,color){ctx.save();ctx.fillStyle='rgba(0,0,0,.42)';ctx.fillRect(0,0,BASE_W,BASE_H);ctx.textAlign='center';ctx.fillStyle=color;ctx.font='900 54px system-ui, Microsoft YaHei';ctx.fillText(title,BASE_W/2,BASE_H/2-12);ctx.fillStyle='#e2e8f0';ctx.font='19px system-ui, Microsoft YaHei';ctx.fillText(sub,BASE_W/2,BASE_H/2+32);ctx.restore();}
  function overlayBox(title,sub,label,fn){ctx.save();ctx.fillStyle='rgba(0,0,0,.58)';ctx.fillRect(0,0,BASE_W,BASE_H);const x=405,y=205,w=470,h=292;roundRect(ctx,x,y,w,h,28);ctx.fillStyle='rgba(15,23,42,.97)';ctx.fill();ctx.strokeStyle='rgba(147,197,253,.42)';ctx.lineWidth=2;ctx.stroke();ctx.textAlign='center';ctx.fillStyle='#fef3c7';ctx.font='900 42px system-ui, Microsoft YaHei';ctx.fillText(title,x+w/2,y+72);ctx.fillStyle='#cbd5e1';ctx.font='16px system-ui, Microsoft YaHei';centered(sub,x+w/2,y+112,390,24); if(game.state==='victory')stars(x+194,y+164,game.resultStars,false); btn(x+145,y+200,180,48,label,'#3b82f6',fn); btn(x+145,y+254,180,38,'返回菜单','#475569',()=>{game.state='menu';game.page='campaign';audio.stopMusic();});ctx.restore();}

  canvas.addEventListener('mousemove', e=>{ const p=screenToGame(e.clientX,e.clientY), g=unproject(p.x,p.y); game.hover={x:p.x,y:p.y,gx:g.x,gy:g.y,world:p.x>=0&&p.x<=BASE_W&&p.y>=0&&p.y<=BASE_H&&g.x>=0&&g.x<=WORLD_W&&g.y>=0&&g.y<=WORLD_H}; });
  canvas.addEventListener('mousedown', e=>{ audio.init(); const p=screenToGame(e.clientX,e.clientY), g=unproject(p.x,p.y); for(let i=buttons.length-1;i>=0;i--){const b=buttons[i]; if(pointIn(p.x,p.y,b.x,b.y,b.w,b.h)){b.fn();return;}} if(game.state==='play'&&p.x<PANEL_X){ const picked=[...game.towers].reverse().find(t=>dist(g.x,g.y,t.x,t.y)<=32); if(picked){game.selectedTower=picked;audio.click();} else if(game.selectedTower)game.selectedTower=null; else makeTower(game.selected,g.x,g.y); } });
  window.addEventListener('keydown', e=>{ if(e.key===' '||e.code==='Space'){e.preventDefault(); if(game.state==='play'){game.paused=!game.paused;audio.click();}} if(e.key==='Enter')queueWave(); if(e.key==='Escape'){ if(game.state==='play'||game.state==='victory'||game.state==='defeat'){game.state='menu';game.page='campaign';audio.stopMusic();}} if(/[1-5]/.test(e.key)){ const k=towerOrder[Number(e.key)-1]; if(k){game.selected=k;game.selectedTower=null;}} if((e.key==='u'||e.key==='U')&&game.selectedTower)upgrade(); if((e.key==='s'||e.key==='S')&&game.selectedTower)sell(); });

  let last=performance.now();
  function loop(now){ const dt=Math.min(.033,(now-last)/1000); last=now; game.fa+=dt; game.fc++; if(game.fa>=.5){game.fps=Math.round(game.fc/game.fa);game.fa=0;game.fc=0;} update(dt); draw(); requestAnimationFrame(loop); }
  requestAnimationFrame(loop);
})();
</script>
